<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harrisoni La Mer — Listings</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --charcoal: #2A2B27;
    --teal-dark: #3D5459;
    --teal-mid: #4A6468;
    --white: #FFFFFF;
    --teal-accent: #5C7A80;
    --muted: #8A9A9D;
  }

  body {
    background: var(--charcoal);
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(61,84,89,0.25) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease both;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .logo-rule {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .rule-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--teal-mid));
    opacity: 0.4;
  }

  .rule-line.right {
    background: linear-gradient(to left, transparent, var(--teal-mid));
  }

  .diamond {
    width: 5px;
    height: 5px;
    background: var(--teal-mid);
    transform: rotate(45deg);
    opacity: 0.8;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(34px, 9vw, 48px);
    line-height: 1.05;
    letter-spacing: 0.04em;
    color: var(--cream);
  }

  h1 em {
    font-style: italic;
    color: var(--teal-accent);
  }

  .subtitle {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 12px;
  }

  .section-label {
    align-self: flex-start;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--teal-mid);
    margin-bottom: 8px;
    margin-top: 28px;
    padding-left: 2px;
    animation: fadeUp 0.6s ease 0.08s both;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .link-item {
    display: flex;
    text-decoration: none;
    color: inherit;
    background: rgba(245,240,232,0.03);
    border: 1px solid rgba(74,100,104,0.18);
    padding: 18px 24px;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
  }

  .link-item:nth-child(1) { animation-delay: 0.12s; }
  .link-item:nth-child(2) { animation-delay: 0.18s; }
  .link-item:nth-child(3) { animation-delay: 0.24s; }
  .link-item:nth-child(4) { animation-delay: 0.30s; }

  .link-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--teal-mid);
    transform: scaleY(0);
    transition: transform 0.3s ease;
    transform-origin: bottom;
  }

  .link-item:hover {
    background: rgba(61,84,89,0.18);
    border-color: rgba(74,100,104,0.45);
    transform: translateX(4px);
  }

  .link-item:hover::before { transform: scaleY(1); }

  .link-label {
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--cream);
  }

  .arrow {
    color: var(--teal-mid);
    opacity: 0.6;
    font-size: 16px;
    transition: opacity 0.3s, transform 0.3s;
    flex-shrink: 0;
  }

  .link-item:hover .arrow { opacity: 1; transform: translateX(3px); }

  .footer {
    margin-top: 48px;
    text-align: center;
    animation: fadeUp 0.8s ease 0.55s both;
    width: 100%;
  }

  .footer-rule {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(74,100,104,0.3), transparent);
    margin-bottom: 20px;
  }

  .footer p {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

    </a>

    </a>
    <a class="link-item" href="https://www.sothebysrealty.com/eng/sales/detail/180-l-3136-pchz24/dubai-jumeirah-la-mer-la-mer-south-island-jumeirah-dubai-du" target="_blank" rel="noopener">

    </a>
    <a class="link-item" href="https://www.matikaproperties.ae/offplan-project/dubai/jumeirah-islands/almal-real-estate-harrisoni-la-mer-villa.html" target="_blank" rel="noopener">

    <a class="link-item" href="https://www.luxhabitat.ae/the-journal/open-house-la-mer-south/" target="_blank" rel="noopener">

  <div class="footer">
    <div class="footer-rule"></div>

  </div>

</div>
</body>
</html>
